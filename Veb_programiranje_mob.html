<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Veb programiranje test - Mobilna verzija</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 12px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 20px 16px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.5rem;
            margin-bottom: 6px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.75rem;
        }

        .timer-section {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #2c3e50;
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .timer {
            font-size: 1.6rem;
            font-weight: bold;
            font-family: monospace;
            background: #2c3e50;
            color: #ffd700;
            padding: 6px 16px;
            border-radius: 40px;
            letter-spacing: 2px;
        }

        .question-counter {
            font-size: 0.9rem;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 6px 12px;
            border-radius: 20px;
        }

        .test-content {
            padding: 16px;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .question-card.correct-highlight {
            border-left: 4px solid #28a745;
        }

        .question-card.incorrect-highlight {
            border-left: 4px solid #dc3545;
        }

        .question-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 16px;
            font-size: 0.85rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-points {
            background: rgba(255,255,255,0.2);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
        }

        .question-body {
            padding: 16px;
        }

        .question-text {
            background: #fff;
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 16px;
            border-left: 3px solid #667eea;
            font-size: 0.9rem;
            line-height: 1.45;
            color: #333;
        }

        .options-list {
            margin: 12px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:active {
            background: #f0f0f0;
            transform: scale(0.98);
        }

        .option-checkbox {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .option-radio {
            width: 20px;
            height: 20px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .option-text {
            flex: 1;
            font-size: 0.85rem;
            color: #333;
            line-height: 1.4;
        }

        .matching-items {
            margin: 12px 0;
        }

        .matching-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            margin: 10px 0;
            background: white;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .matching-top {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .matching-left {
            font-weight: bold;
            min-width: auto;
            color: #2c3e50;
            font-size: 0.85rem;
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 8px;
        }

        .matching-arrow {
            color: #667eea;
            font-weight: bold;
            font-size: 1rem;
        }

        .matching-right {
            flex: 1;
            font-size: 0.85rem;
            color: #555;
            line-height: 1.4;
        }

        .answer-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-top: 8px;
        }

        .answer-line label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.9rem;
        }

        .matching-input {
            width: 70px;
            padding: 10px 8px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: bold;
            background: white;
        }

        .matching-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .matching-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .matching-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .fill-blank-input {
            width: 100%;
            max-width: 150px;
            padding: 10px 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
            background: white;
            margin: 5px 0;
        }

        .fill-blank-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fill-blank-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .fill-blank-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .fill-multiple-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 15px 0;
        }

        .fill-multiple-row {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: white;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
        }

        .fill-multiple-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.85rem;
        }

        .fill-multiple-input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 0.9rem;
            text-align: center;
            background: white;
        }

        .fill-multiple-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fill-multiple-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .fill-multiple-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .feedback-indicator {
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.8rem;
        }

        .feedback-indicator.correct {
            background: #d4edda;
            color: #155724;
            border-left: 3px solid #28a745;
        }

        .feedback-indicator.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 3px solid #dc3545;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 20px 0 16px;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            text-align: center;
        }

        .btn-finish {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-finish:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:active {
            transform: scale(0.97);
        }

        .result-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 20px;
            border-radius: 16px;
            margin-top: 16px;
            text-align: center;
        }

        .result-score {
            font-size: 2rem;
            font-weight: bold;
            color: #28a745;
        }

        .result-feedback {
            margin-top: 12px;
            font-size: 0.9rem;
        }

        .time-expired {
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .points-indicator {
            font-size: 0.65rem;
            color: #6c757d;
        }

        /* Skrolovanje */
        .test-content {
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        @media (max-width: 480px) {
            body {
                padding: 8px;
            }
            
            .question-body {
                padding: 12px;
            }
            
            .option-item {
                padding: 10px;
            }
            
            .btn {
                padding: 12px 16px;
                font-size: 0.9rem;
            }
            
            .timer {
                font-size: 1.3rem;
                padding: 4px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Veb programiranje test</h1>
            <p>12 nasumičnih pitanja | 15 minuta</p>
        </div>

        <div class="timer-section">
            <div class="question-counter" id="questionCounter">Pitanja: 0 / 12</div>
            <div class="timer">
                ⏱️ <span id="timerDisplay">15:00</span>
            </div>
        </div>

        <div class="test-content" id="testContent">
            <div style="text-align: center; padding: 40px;">
                <p>Učitavanje testa...</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-finish" onclick="finishTest()">✅ Završi test</button>
            <button class="btn btn-reset" onclick="resetTest()">🔄 Resetuj</button>
        </div>

        <div id="resultSection" style="display: none;" class="result-section">
            <div class="result-score" id="resultScore">0 / 0</div>
            <div class="result-feedback" id="resultFeedback"></div>
        </div>
    </div>

    <script>
        // ==================== BAZA PITANJA ====================
        const allQuestions = [
            { id: 188, text: "Koji iskaz opisuje ulogu Domain Name Server-a?", type: "single", points: 1, options: [
                "Prevođenje imena domena u IP adresu",
                "Hostovanje veb sajta",
                "Vršenje funkcije glavnog čvora u lokalnoj računarskoj mreži",
                "Prikaz dinamičkih veb stranica"
            ], correct: 1 },
            { id: 189, text: "Microsoft-ova platforma za razvoj veb aplikacija?", type: "single", points: 1, options: ["HTML", "JSP", "PHP", "ASP.NET"], correct: 4 },
            { id: 190, text: "ASP.NET MVC 3.0 nova tehnika za definisanje pogleda (View Engine)?", type: "single", points: 1, options: ["ASP.NET View Engine", "Salome", "Razor", "Default"], correct: 3 },
            { id: 191, text: "Simbol za komentare u ASP.NET MVC Razor sintaksi?", type: "single", points: 1, options: ["//", "/* ... */", "<!--...-->", "@* ... *@"], correct: 4 },
            { id: 192, text: "SOAP protokol u osnovi koristi koji jezik?", type: "single", points: 1, options: ["HTML", "CSS", "JavaScript", "XML"], correct: 4 },
            { id: 193, text: "Uloga Proxy servera?", type: "single", points: 1, options: [
                "Omogućava prenos datoteka sa udaljenog računara",
                "Poboljšava performanse konekcije, filtrira zahteve i prosleđuje ih na pravi server",
                "Pruža hosting medijskim sadržajima",
                "Hostuje veb strane"
            ], correct: 2 },
            { id: 194, text: "Tokom izvršavanja JavaScript aplikacije:", type: "single", points: 1, options: [
                "Nije moguće menjati tipove promenljivih",
                "Tipovi promenljivih se mogu menjati tokom izvršavanja",
                "Tipovi se obavezno menjaju",
                "JavaScript ne podržava tipove"
            ], correct: 2 },
            { id: 195, text: "Uključivanje master stranice _Layout.WindowsPhone.cshtml:", type: "single", points: 1, options: [
                "@Html.ActionLink(\"_Layout.WindowsPhone.cshtml\");",
                "Layout = \"~/views/Shared/_layout.WindowsPhone.cshtml\";",
                "Layout = \"Layout.WindowsPhone.cshtml\";",
                "@Html.Partial(\"_Layout.WindowsPhone.cshtml\");"
            ], correct: 2 },
            { id: 196, text: "Tip servisa koji može biti hostovan u konzolnoj aplikaciji?", type: "single", points: 1, options: ["ASMX", "RESTful", "WCF", "XML"], correct: 3 },
            { id: 197, text: "Skript jezici za dinamičke veb stranice:", type: "multiple", points: 2, options: ["PHP", "jQuery", "ASP.NET", "JSP", "VBScript", "CSS", "HTML"], correct: [1, 3, 4] },
            { id: 198, text: "Funkcije za konverziju stringa u broj u JS:", type: "multiple", points: 2, options: [
                "Nije moguće menjati tipove",
                "EVAL", "parseINT", "parseFLOAT", "parseDOUBLE", "tryParseINT"
            ], correct: [3, 4] },
            { id: 199, text: "Šta definiše WSDL?", type: "multiple", points: 2, options: [
                "Komunikacioni interfejs za veb servis",
                "Način implementacije metoda",
                "Spisak metoda veb servisa",
                "Komunikacioni protokol"
            ], correct: [1, 3] },
            { id: 200, text: "Elementi .NET Framework-a:", type: "multiple", points: 2, options: [
                "Klase korisničkog interfejsa",
                "Klase za pristup podacima",
                "Klase korisnika",
                "Veb server i primeri baze",
                "Klase za manipulaciju XML",
                "Skript jezik na klijentu"
            ], correct: [1, 2, 5] },
            { id: 201, text: "Moguće povratne vrednosti MVC kontrolera:", type: "multiple", points: 2, options: [
                "ViewResult", "MVCResult", "ModelResult", "JsonResult", "RedirectResult", "ASPResult"
            ], correct: [1, 4, 5] },
            { id: 202, text: "Šta definiše XML Schema (XSD)?", type: "multiple", points: 2, options: [
                "Tipove podataka XML elemenata",
                "Vrednosti XML elemenata",
                "Child elemente",
                "Uređenje child elemenata",
                "Sortiranje atributa",
                "Odnos root elemenata"
            ], correct: [1, 3, 4] },
            { id: 203, type: "fill_multiple", points: 1.5, 
              text: "URL: http://localhost/Customer/Details/5",
              fields: [
                  { label: "Ime kontrolera (Controller Name)", correct: "Customer" },
                  { label: "Naziv metode (Action Method Name)", correct: "Details" },
                  { label: "ID parametra metode", correct: "5" }
              ] },
            { id: 204, type: "matching", points: 2,
              leftItems: ["1. window", "2. location", "3. history", "4. document"],
              rightItems: [
                  "sadrži URL adrese koje su prethodno bile posećene",
                  "predstavlja trenutno učitani dokument",
                  "sadrži info o URL adresi trenutnog dokumenta",
                  "objekat najvišeg nivoa - prozor pretraživača"
              ],
              correct: [4, 3, 2, 1] },
            { id: 205, type: "matching", points: 2,
              leftItems: ["1. focus", "2. submit", "3. load", "4. blur"],
              rightItems: ["Izađe iz fokusa", "Učitava stranicu", "Uđe u fokus", "Izvrši slanje forme"],
              correct: [3, 4, 2, 1] },
            { id: 206, type: "matching", points: 2,
              leftItems: ["1. HTML kontrole", "2. Kontrole za podatke", "3. Serverske kontrole", "4. Sistemske komponente"],
              rightItems: [
                  "TextBox, Label, Button, ListBox",
                  "FileSystemWatcher, EventLog",
                  "SqlConnection, SqlCommand",
                  "Text Area, Table, Image"
              ],
              correct: [1, 4, 2, 3] },
            { id: 207, type: "matching", points: 2,
              leftItems: ["1. HTTP moduli", "2. Bezbednosni moduli", "3. Moduli za evidenciju", "4. Moduli sadržaja"],
              rightItems: [
                  "Praćenje i izveštavanje o događajima",
                  "Obrada zahteva za statičke fajlove",
                  "Vraćanje HTTP grešaka, preusmeravanje",
                  "Autorizacija URL adresa"
              ],
              correct: [2, 4, 1, 3] }
        ];

        let selectedQuestions = [];
        let userAnswers = {};
        let timeLeft = 15 * 60;
        let timerInterval = null;
        let testFinished = false;

        function selectRandomQuestions() {
            const shuffled = [...allQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 12);
        }

        function renderQuestions() {
            selectedQuestions = selectRandomQuestions();
            userAnswers = {};
            
            const container = document.getElementById('testContent');
            let html = '';
            
            selectedQuestions.forEach((q, idx) => {
                html += `
                    <div class="question-card" id="q-${idx}">
                        <div class="question-header">
                            <span>Pitanje ${idx + 1}</span>
                            <span class="question-points">${q.points} poena</span>
                        </div>
                        <div class="question-body">
                            <div class="question-text">
                                <strong>${q.id}. </strong>${q.text}
                            </div>
                `;
                
                if (q.type === 'single') {
                    html += renderSingleChoice(q, idx);
                } else if (q.type === 'multiple') {
                    html += renderMultipleChoice(q, idx);
                } else if (q.type === 'matching') {
                    html += renderMatching(q, idx);
                } else if (q.type === 'fill_multiple') {
                    html += renderFillMultiple(q, idx);
                }
                
                html += `
                            <div class="feedback-indicator" id="feedback-${idx}"></div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('questionCounter').innerHTML = `📋 Pitanja: ${selectedQuestions.length} / 12`;
        }
        
        function renderSingleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('radio-${idx}-${optIdx}').click()">
                        <input type="radio" name="q-${idx}" id="radio-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMultipleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('cb-${idx}-${optIdx}').click()">
                        <input type="checkbox" class="option-checkbox" id="cb-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveMultipleAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMatching(q, idx) {
            let html = '<div class="matching-items">';
            for (let i = 0; i < q.leftItems.length; i++) {
                html += `
                    <div class="matching-item">
                        <div class="matching-top">
                            <span class="matching-left">${q.leftItems[i]}</span>
                            <span class="matching-arrow">→</span>
                            <span class="matching-right">${q.rightItems[i]}</span>
                        </div>
                        <div class="answer-line">
                            <label>___</label>
                            <input type="text" class="matching-input" id="match-${idx}-${i}" maxlength="1" placeholder=" " oninput="saveMatchingAnswer(${idx}, ${i}, this.value)">
                            <span class="points-indicator">(${(q.points / q.correct.length).toFixed(1)}p)</span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }
        
        function renderFillMultiple(q, idx) {
            let html = '<div class="fill-multiple-container">';
            q.fields.forEach((field, i) => {
                html += `
                    <div class="fill-multiple-row">
                        <div class="fill-multiple-label">${field.label}:</div>
                        <input type="text" class="fill-multiple-input" id="fill-${idx}-${i}" placeholder="Unesite odgovor..." oninput="saveFillMultipleAnswer(${idx}, ${i}, this.value)">
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function saveAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = {};
            userAnswers[qIdx].answer = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMultipleAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            
            const cb = document.getElementById(`cb-${qIdx}-${value-1}`);
            if (cb.checked) {
                if (!userAnswers[qIdx].answer.includes(value)) {
                    userAnswers[qIdx].answer.push(value);
                }
            } else {
                userAnswers[qIdx].answer = userAnswers[qIdx].answer.filter(v => v !== value);
            }
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMatchingAnswer(qIdx, matchIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[matchIdx] = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveFillMultipleAnswer(qIdx, fieldIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[fieldIdx] = value.trim();
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function calculateMultipleChoicePoints(q, userAnswer) {
            if (!userAnswer || !userAnswer.length) return 0;
            const userSet = new Set(userAnswer);
            const correctSet = new Set(q.correct);
            for (let val of userSet) {
                if (!correctSet.has(val)) return 0;
            }
            const pointsPerCorrect = q.points / correctSet.size;
            let correctCount = 0;
            for (let val of userSet) {
                if (correctSet.has(val)) correctCount++;
            }
            return correctCount * pointsPerCorrect;
        }
        
        function checkMatching(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.correct.length) return false;
            for (let i = 0; i < q.correct.length; i++) {
                if (parseInt(userAnswer[i]) !== q.correct[i]) return false;
            }
            return true;
        }
        
        function checkFillMultiple(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.fields.length) return false;
            for (let i = 0; i < q.fields.length; i++) {
                if (userAnswer[i]?.toLowerCase().trim() !== q.fields[i].correct.toLowerCase()) return false;
            }
            return true;
        }
        
        function calculatePoints(q, userAnswer) {
            if (q.type === 'single') {
                return (userAnswer === q.correct) ? q.points : 0;
            } else if (q.type === 'multiple') {
                return calculateMultipleChoicePoints(q, userAnswer);
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer) ? q.points : 0;
            } else if (q.type === 'fill_multiple') {
                if (!userAnswer) return 0;
                
                let hasIncorrect = false;
                for (let i = 0; i < q.fields.length; i++) {
                    const userVal = userAnswer[i]?.trim();
                    if (userVal !== undefined && userVal !== '') {
                        if (userVal.toLowerCase() !== q.fields[i].correct.toLowerCase()) {
                            hasIncorrect = true;
                            break;
                        }
                    }
                }
                
                if (hasIncorrect) return 0;
                
                let correctCount = 0;
                for (let i = 0; i < q.fields.length; i++) {
                    const userVal = userAnswer[i]?.trim();
                    if (userVal && userVal.toLowerCase() === q.fields[i].correct.toLowerCase()) {
                        correctCount++;
                    }
                }
                
                const pointsPerField = q.points / q.fields.length;
                return correctCount * pointsPerField;
            }
            return 0;
        }
        
        function isFullyCorrect(q, userAnswer) {
            if (q.type === 'single') {
                return userAnswer === q.correct;
            } else if (q.type === 'multiple') {
                if (!userAnswer || !userAnswer.length) return false;
                const userSet = new Set(userAnswer);
                const correctSet = new Set(q.correct);
                if (userSet.size !== correctSet.size) return false;
                for (let val of userSet) {
                    if (!correctSet.has(val)) return false;
                }
                return true;
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer);
            } else if (q.type === 'fill_multiple') {
                return checkFillMultiple(q, userAnswer);
            }
            return false;
        }
        
        function finishTest() {
            if (testFinished) return;
            if (timerInterval) clearInterval(timerInterval);
            testFinished = true;
            
            let totalPoints = 0, maxPoints = 0;
            
            selectedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx]?.answer;
                const points = calculatePoints(q, userAnswer);
                const isFullyCorrectAnswer = isFullyCorrect(q, userAnswer);
                totalPoints += points;
                maxPoints += q.points;
                
                const feedbackDiv = document.getElementById(`feedback-${idx}`);
                const questionCard = document.getElementById(`q-${idx}`);
                
                if (isFullyCorrectAnswer) {
                    feedbackDiv.innerHTML = `✅ Tačno! +${points.toFixed(2)} poena`;
                    feedbackDiv.className = 'feedback-indicator correct';
                    questionCard.classList.add('correct-highlight');
                } else {
                    let correctAnswerText = '';
                    if (q.type === 'single') {
                        correctAnswerText = `Tačno: ${q.options[q.correct - 1]}`;
                    } else if (q.type === 'multiple') {
                        const correctTexts = q.correct.map(c => q.options[c - 1]);
                        correctAnswerText = `Tačno: ${correctTexts.join(', ')}`;
                    } else if (q.type === 'matching') {
                        const correctTexts = [];
                        for (let i = 0; i < q.leftItems.length; i++) {
                            correctTexts.push(`${q.leftItems[i]} → ${q.correct[i]}`);
                        }
                        correctAnswerText = `Tačno: ${correctTexts.join('; ')}`;
                    } else if (q.type === 'fill_multiple') {
                        const correctTexts = q.fields.map(f => `${f.label}: ${f.correct}`);
                        correctAnswerText = `Tačno: ${correctTexts.join(', ')}`;
                    }
                    feedbackDiv.innerHTML = `❌ Netačno! ${correctAnswerText}<br>+${points.toFixed(2)} poena`;
                    feedbackDiv.className = 'feedback-indicator incorrect';
                    questionCard.classList.add('incorrect-highlight');
                }
                
                // Vizuelna indikacija
                if (q.type === 'matching') {
                    for (let i = 0; i < q.correct.length; i++) {
                        const input = document.getElementById(`match-${idx}-${i}`);
                        if (input) {
                            const userVal = parseInt(userAnswer?.[i]);
                            if (userVal === q.correct[i]) input.classList.add('correct-answer');
                            else if (userVal) input.classList.add('incorrect-answer');
                        }
                    }
                } else if (q.type === 'fill_multiple') {
                    for (let i = 0; i < q.fields.length; i++) {
                        const input = document.getElementById(`fill-${idx}-${i}`);
                        if (input) {
                            const userVal = userAnswer?.[i];
                            if (userVal?.toLowerCase().trim() === q.fields[i].correct.toLowerCase()) {
                                input.classList.add('correct-answer');
                            } else if (userVal && userVal.trim() !== '') {
                                input.classList.add('incorrect-answer');
                            }
                        }
                    }
                }
            });
            
            const resultSection = document.getElementById('resultSection');
            const resultScore = document.getElementById('resultScore');
            const resultFeedback = document.getElementById('resultFeedback');
            
            resultSection.style.display = 'block';
            resultScore.innerHTML = `${totalPoints.toFixed(2)} / ${maxPoints}`;
            
            const percentage = (totalPoints / maxPoints) * 100;
            if (percentage >= 90) resultFeedback.innerHTML = '🏆 Odličan rezultat! Izvanredno znanje! 🏆';
            else if (percentage >= 70) resultFeedback.innerHTML = '👍 Vrlo dobro! Solidno znanje! 👍';
            else if (percentage >= 50) resultFeedback.innerHTML = '📚 Zadovoljavajući rezultat. Ima prostora za napredak. 📚';
            else resultFeedback.innerHTML = '📖 Potrebno je više vežbe. Pokušajte ponovo. 📖';
            
            document.querySelectorAll('input').forEach(input => input.disabled = true);
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (testFinished) return;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    const container = document.getElementById('testContent');
                    const timeExpiredDiv = document.createElement('div');
                    timeExpiredDiv.className = 'time-expired';
                    timeExpiredDiv.innerHTML = '⏰ Vreme je isteklo! Test se automatski završava. ⏰';
                    container.insertBefore(timeExpiredDiv, container.firstChild);
                    finishTest();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('timerDisplay').innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    if (timeLeft <= 60) document.getElementById('timerDisplay').style.color = '#dc3545';
                }
            }, 1000);
        }
        
        function resetTest() {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = 15 * 60;
            testFinished = false;
            document.getElementById('timerDisplay').innerHTML = '15:00';
            document.getElementById('timerDisplay').style.color = '#ffd700';
            document.getElementById('resultSection').style.display = 'none';
            renderQuestions();
            startTimer();
        }
        
        renderQuestions();
        startTimer();
    </script>
</body>
