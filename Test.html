<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Veb programiranje test - 12 nasumičnih pitanja</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #2c3e50, #1a1a2e);
            color: white;
            padding: 16px 12px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.3rem;
            margin-bottom: 4px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.7rem;
        }

        .timer-section {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #2c3e50;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        .timer {
            font-size: 1.4rem;
            font-weight: bold;
            font-family: monospace;
            background: #2c3e50;
            color: #ffd700;
            padding: 4px 12px;
            border-radius: 30px;
            letter-spacing: 1px;
        }

        .question-counter {
            font-size: 0.8rem;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .test-content {
            padding: 12px;
            max-height: calc(100vh - 160px);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .question-card {
            background: #f8f9fa;
            border-radius: 14px;
            margin-bottom: 16px;
            overflow: hidden;
            border: 1px solid #e0e0e0;
            transition: all 0.3s;
        }

        .question-card.correct-highlight {
            border-left: 4px solid #28a745;
        }

        .question-card.incorrect-highlight {
            border-left: 4px solid #dc3545;
        }

        .question-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 14px;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-points {
            background: rgba(255,255,255,0.2);
            padding: 3px 8px;
            border-radius: 20px;
            font-size: 0.7rem;
        }

        .question-body {
            padding: 14px;
        }

        .question-text {
            background: #fff;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 14px;
            border-left: 3px solid #667eea;
            font-size: 0.85rem;
            line-height: 1.45;
            color: #333;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .options-list {
            margin: 10px 0;
        }

        .option-item {
            display: flex;
            align-items: flex-start;
            padding: 10px 12px;
            margin: 6px 0;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
            background: white;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-item:active {
            background: #f0f0f0;
        }

        .option-checkbox {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .option-radio {
            width: 18px;
            height: 18px;
            margin-right: 12px;
            margin-top: 2px;
            cursor: pointer;
            flex-shrink: 0;
            accent-color: #667eea;
        }

        .option-text {
            flex: 1;
            font-size: 0.85rem;
            color: #333;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .matching-items {
            margin: 10px 0;
        }

        .matching-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .matching-top {
            display: flex;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 6px;
        }

        .matching-left {
            font-weight: bold;
            color: #2c3e50;
            font-size: 0.8rem;
            background: #e9ecef;
            padding: 3px 8px;
            border-radius: 6px;
            word-break: break-word;
        }

        .matching-arrow {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .matching-right {
            flex: 1;
            font-size: 0.8rem;
            color: #555;
            line-height: 1.4;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

        .answer-line {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #f8f9fa;
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 6px;
        }

        .answer-line label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.85rem;
        }

        .matching-input {
            width: 60px;
            padding: 8px 6px;
            border: 2px solid #ddd;
            border-radius: 8px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: bold;
            background: white;
        }

        .matching-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .matching-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .matching-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .fill-multiple-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0;
        }

        .fill-multiple-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: white;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e0e0e0;
        }

        .fill-multiple-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.8rem;
        }

        .fill-multiple-input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 0.85rem;
            text-align: left;
            background: white;
        }

        .fill-multiple-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .fill-multiple-input.correct-answer {
            border-color: #28a745;
            background: #d4edda;
        }

        .fill-multiple-input.incorrect-answer {
            border-color: #dc3545;
            background: #f8d7da;
        }

        .feedback-indicator {
            margin-top: 10px;
            padding: 8px;
            border-radius: 8px;
            font-size: 0.75rem;
        }

        .feedback-indicator.correct {
            background: #d4edda;
            color: #155724;
            border-left: 3px solid #28a745;
        }

        .feedback-indicator.incorrect {
            background: #f8d7da;
            color: #721c24;
            border-left: 3px solid #dc3545;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 16px 0 12px;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 14px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            flex: 1;
            text-align: center;
        }

        .btn-finish {
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
        }

        .btn-finish:active {
            transform: scale(0.97);
        }

        .btn-reset {
            background: #6c757d;
            color: white;
        }

        .btn-reset:active {
            transform: scale(0.97);
        }

        .result-section {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            padding: 16px;
            border-radius: 14px;
            margin-top: 12px;
            text-align: center;
        }

        .result-score {
            font-size: 1.8rem;
            font-weight: bold;
            color: #28a745;
        }

        .result-feedback {
            margin-top: 10px;
            font-size: 0.85rem;
        }

        .time-expired {
            background: #dc3545;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 10px;
            margin: 12px 0;
            font-size: 0.85rem;
        }

        .points-indicator {
            font-size: 0.6rem;
            color: #6c757d;
        }

        /* Sprečavanje skakanja teksta */
        .question-text, .option-text, .matching-right, .fill-multiple-label {
            word-break: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }

        @media (max-width: 480px) {
            body {
                padding: 6px;
            }
            .question-body {
                padding: 10px;
            }
            .option-item {
                padding: 8px 10px;
            }
            .btn {
                padding: 10px 16px;
                font-size: 0.85rem;
            }
            .timer {
                font-size: 1.2rem;
                padding: 3px 10px;
            }
            .question-text {
                font-size: 0.8rem;
                padding: 10px;
            }
            .option-text {
                font-size: 0.8rem;
            }
            .matching-left, .matching-right {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Veb programiranje test</h1>
            <p>12 nasumičnih pitanja | 15 minuta</p>
        </div>

        <div class="timer-section">
            <div class="question-counter" id="questionCounter">Pitanja: 0 / 12</div>
            <div class="timer">
                ⏱️ <span id="timerDisplay">15:00</span>
            </div>
        </div>

        <div class="test-content" id="testContent">
            <div style="text-align: center; padding: 30px;">
                <p>Učitavanje testa...</p>
            </div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-finish" onclick="finishTest()">✅ Završi test</button>
            <button class="btn btn-reset" onclick="resetTest()">🔄 Resetuj</button>
        </div>

        <div id="resultSection" style="display: none;" class="result-section">
            <div class="result-score" id="resultScore">0 / 0</div>
            <div class="result-feedback" id="resultFeedback"></div>
        </div>
    </div>

    <script>
        // ==================== BAZA PITANJA - PREMA DOKUMENTU ====================
        const allQuestions = [
            // 188
            { id: 188, text: "Заокружити исказ који описује улогу Domain Name Server-a:", type: "single", points: 1, options: [
                "превођење имена домена у IP адресу",
                "хостовање веб сајта",
                "вршење функције главног чвора у локалној рачунарској мрежи",
                "приказ динамичких веб страница"
            ], correct: 1 },
            
            // 189
            { id: 189, text: "Једну од платформи за развој веб апликација развио је и Microsoft. Заокружити назив Microsoft-ове платформе за развој веб апликација:", type: "single", points: 1, options: [
                "HTML", "JSP", "PHP", "ASP.NET"
            ], correct: 4 },
            
            // 190
            { id: 190, text: "ASP.NET MVC 3.0 долази са новом техником за дефинисање погледа (View Engine). Заокружити назив ове технике:", type: "single", points: 1, options: [
                "ASP.NET View Engine", "Salome", "Razor", "Default"
            ], correct: 3 },
            
            // 191
            { id: 191, text: "Заокружити од понуђених опција који симбол се користи за коментаре у ASP.NET MVC Razor синтакси:", type: "single", points: 1, options: [
                "//", "/* ... */", "/!--...--/", "@* ... *@"
            ], correct: 4 },
            
            // 192
            { id: 192, text: "SOAP протокол (Simple Object Access protocol) који се користи за размену података између рачунара коришћењем веб сервиса, у основи користи један скрипт језик. Заокруживањем редног броја, обележити о ком језику се ради.", type: "single", points: 1, options: [
                "HTML", "CSS", "JavaScript", "XML"
            ], correct: 4 },
            
            // 193
            { id: 193, text: "Заокружити исказ који дефинише улогу Proxy сервера:", type: "single", points: 1, options: [
                "Омогућава пренос датотека са удаљеног рачунара и ка удаљеном рачунару",
                "Побољшава перформансе конекције, филтрира захтеве и прослеђује их на прави сервер",
                "Пружа хостинг различитим медијским садржајима (Аудио, Видео)",
                "Хостује веб стране"
            ], correct: 2 },
            
            // 194 - JavaScript tipovi
            { id: 194, text: "Заокружити исказ који допуњује опис понашања променљивих током извршења програма написаног у језику JavaScript. Током извршавања апликације написане у JavaScript-y:", type: "single", points: 1, options: [
                "Није могуће мењати типове променљивих у току извршавања апликације",
                "Типови променљивих се могу мењати током извршавања програма",
                "Типови променљивих се обавезно мењају током извршавања апликације у одговарајући веб тип променљиве",
                "JavaScript не подржава типове променљивих"
            ], correct: 2 },
            
            // 195 - ASP.NET MVC Layout
            { id: 195, text: "Дата је ASP.NET MVC апликација у којој је креирана нова мастер страница (master layout page) која се зове _Layout.WindowsPhone.cshtml. Ако желимо да укључимо нову мастер страницу на новом погледу (View) који сегмент кода треба да искористимо.", type: "single", points: 1, options: [
                "@Html.ActionLink(\"_Layout.WindowsPhone.cshtml\");",
                "Layout = \"~/views/Shared/_layout.WindowsPhone.cshtml\";",
                "Layout = \"Layout.WindowsPhone.cshtml\";",
                "@Html.Partial(\"_Layout.WindowsPhone.cshtml\");"
            ], correct: 2 },
            
            // 196 - WCF servis
            { id: 196, text: "Заокружити један од понуђених типова сервиса који може бити хостован у конзолној или десктоп апликацији:", type: "single", points: 1, options: [
                "ASMX", "RESTful", "WCF", "XML"
            ], correct: 3 },
            
            // 197 - Skript jezici (višestruki izbor)
            { id: 197, text: "Заокружите број испред назива скрипт језика за израду динамичких веб страница:", type: "multiple", points: 2, options: [
                "PHP", "jQuery", "ASP.NET", "JSP", "VBScript", "CSS", "HTML"
            ], correct: [1, 3, 4] },
            
            // 198 - JavaScript konverzije
            { id: 198, text: "У клијентском скрипт језику Java Script постоји неколико могућности конверзије стринга у број. Заокружити функције које омогућавају те конверзије:", type: "multiple", points: 2, options: [
                "Није могуће мењати типове променљивих у току извршавања апликације",
                "Функција EVAL - процењује стринг и ако је могуће претвара га у број",
                "Функција parseINT – конвертује стринг у целобројни број, ако је могуће",
                "Функција parseFLOAT – конвертује стринг у реалан број, ако је могуће",
                "Функција parseDOUBLE – конвертује стринг у реалан број, ако је могуће",

            ], correct: [3, 4] },
            
            // 199 - WSDL
            { id: 199, text: "Обележити шта од наведеног је дефинисано WSDL језиком (Web Services Description Language) (заокружити више понуђених одговора):", type: "multiple", points: 2, options: [

                "Начин имплементације метода веб сервиса",
                "Списак метода веб сервиса",
                "Комуникациони протокол за веб сервис"
            ], correct: [1, 3] },
            
            // 200 - .NET Framework
            { id: 200, text: "Microsoft .NET Framework садржи базне класе које пружају широк спектар могућности. Заокружити елементе који су укључени у .NET Framework:", type: "multiple", points: 2, options: [
                "класе корисничког интерфејса",
                "класе за приступ подацима и базама",
                "класе корисника",
                "веб сервер и примере базе података",
                "класе за манипулацију XML документа",
                "скрипт језик који се извршава на клијент страни"
            ], correct: [1, 2, 5] },
            
            // 201 - MVC povratne vrednosti
            { id: 201, text: "Повратне вредности акције MVC контролера (controller action method) могу бити различитих типова. Заокружити бројеве испред могућих повратних вредности.", type: "multiple", points: 2, options: [
                "ViewResult", "MVCResult", "ModelResult", "JsonResult", "RedirectResult", "ASPResult"
            ], correct: [1, 4, 5] },
            
            // 202 - XML Schema
            { id: 202, text: "XML Schema (XSD) описује структуру XML документа Обележити шта од наведеног дефинише XML Schema (заокружити више понуђених одговора):", type: "multiple", points: 2, options: [
                "Типове података XML елемената и атрибута",
                "Вредности XML елемената и атрибута",
                "XML елементе који представљају child (деца) елементе",

            // 203 - Fill multiple
            { id: 203, type: "fill_multiple", points: 1.5, 
              text: "Дата је MVC стандардна рута (default route) http://localhost/Customer/Details/5 која има 3 сегмента. Препознати на основу дате руте вредности ових сегмената и допунити реченицу: Име контролера (Controller Name) је: ______ , назив методе (Action Method Name) је: ______ , а ID параметра методе је дат са: ___",

            // 204 - JavaScript objekti (povezivanje)

                  "објекат највишег нивоа који садржи све друге објекте и представља прозор претраживача"

              correct: [4, 3, 1, 2] },
            
            // 205 - JavaScript događaji
            { id: 205, type: "matching", points: 2,

              rightItems: [
                  "Изађе из фокуса елемента форме",

                  "Уђе у фокус неког елемента форме",
                  "Изврши слање форме"
              ],
              correct: [4, 3, 1, 2] },
            
            // 206 - Veb obrasci komponente
            { id: 206, type: "matching", points: 2,
              leftItems: ["1. HTML контроле", "2. Контроле за податке", "3. Серверске контроле", "4. Системске компоненте"],
              rightItems: [
                  "TextBox, Label, Button, ListBox, DropDownList, DataGrid",
                  "FileSystemWatcher, EventLog, MessageQueue",
                  "SqlConnection, SqlCommand, OleDbConnection",
                  "Text Area, Table, Image, Submit Button, Reset Button"
              ],
              correct: [3, 4, 2, 1] },
            
            // 207 - IIS moduli
            { id: 207, type: "matching", points: 2,
              leftItems: ["1. HTTP модули", "2. Безбедностни модули", "3. Модули за евиденцију и дијагностику", "4. Модули садржаја"],
              rightItems: [
                  "Модули за праћење и извештавање о догађајима насталим током процесирања захтева...",
                  "Модули за обраду захтева за статичке фајлове, враћање подразумевне странице када клијент не наведе ресурс у захтеву, излиставање садржаја директоријума...",
                  "Модули за одговорарање на информације, враћање HTTP грешака, преусмеравање захтева...",
                  "Модули за ауторизацију УРЛ адреса, филтрирање захтева..."
              ],
              correct: [3, 4, 1, 2] }
        ];

        let selectedQuestions = [];
        let userAnswers = {};
        let timeLeft = 15 * 60;
        let timerInterval = null;
        let testFinished = false;

        function selectRandomQuestions() {
            const shuffled = [...allQuestions];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled.slice(0, 12);
        }

        function renderQuestions() {
            selectedQuestions = selectRandomQuestions();
            userAnswers = {};
            
            const container = document.getElementById('testContent');
            let html = '';
            
            selectedQuestions.forEach((q, idx) => {
                html += `
                    <div class="question-card" id="q-${idx}">
                        <div class="question-header">
                            <span>Питање ${idx + 1}</span>
                            <span class="question-points">${q.points} поена</span>
                        </div>
                        <div class="question-body">
                            <div class="question-text">
                                <strong>${q.id}. </strong>${q.text}
                            </div>
                `;
                
                if (q.type === 'single') {
                    html += renderSingleChoice(q, idx);
                } else if (q.type === 'multiple') {
                    html += renderMultipleChoice(q, idx);
                } else if (q.type === 'matching') {
                    html += renderMatching(q, idx);
                } else if (q.type === 'fill_multiple') {
                    html += renderFillMultiple(q, idx);
                }
                
                html += `
                            <div class="feedback-indicator" id="feedback-${idx}"></div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
            document.getElementById('questionCounter').innerHTML = `📋 Питања: ${selectedQuestions.length} / 12`;
        }
        
        function renderSingleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('radio-${idx}-${optIdx}').click()">
                        <input type="radio" name="q-${idx}" id="radio-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMultipleChoice(q, idx) {
            let html = '<div class="options-list">';
            q.options.forEach((opt, optIdx) => {
                html += `
                    <div class="option-item" onclick="document.getElementById('cb-${idx}-${optIdx}').click()">
                        <input type="checkbox" class="option-checkbox" id="cb-${idx}-${optIdx}" value="${optIdx + 1}" onchange="saveMultipleAnswer(${idx}, ${optIdx + 1})">
                        <span class="option-text">${opt}</span>
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function renderMatching(q, idx) {
            let html = '<div class="matching-items">';
            for (let i = 0; i < q.leftItems.length; i++) {
                html += `
                    <div class="matching-item">
                        <div class="matching-top">
                            <span class="matching-left">${q.leftItems[i]}</span>
                            <span class="matching-arrow">→</span>
                            <span class="matching-right">${q.rightItems[i]}</span>
                        </div>
                        <div class="answer-line">
                            <label>___</label>
                            <input type="text" class="matching-input" id="match-${idx}-${i}" maxlength="1" placeholder=" " oninput="saveMatchingAnswer(${idx}, ${i}, this.value)">
                            <span class="points-indicator">(${(q.points / q.correct.length).toFixed(1)}п)</span>
                        </div>
                    </div>
                `;
            }
            html += '</div>';
            return html;
        }
        
        function renderFillMultiple(q, idx) {
            let html = '<div class="fill-multiple-container">';
            q.fields.forEach((field, i) => {
                html += `
                    <div class="fill-multiple-row">
                        <div class="fill-multiple-label">${field}:</div>
                        <input type="text" class="fill-multiple-input" id="fill-${idx}-${i}" placeholder="Унесите одговор..." oninput="saveFillMultipleAnswer(${idx}, ${i}, this.value)">
                    </div>
                `;
            });
            html += '</div>';
            return html;
        }
        
        function saveAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = {};
            userAnswers[qIdx].answer = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMultipleAnswer(qIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            
            const cb = document.getElementById(`cb-${qIdx}-${value-1}`);
            if (cb.checked) {
                if (!userAnswers[qIdx].answer.includes(value)) {
                    userAnswers[qIdx].answer.push(value);
                }
            } else {
                userAnswers[qIdx].answer = userAnswers[qIdx].answer.filter(v => v !== value);
            }
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveMatchingAnswer(qIdx, matchIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[matchIdx] = value;
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function saveFillMultipleAnswer(qIdx, fieldIdx, value) {
            if (!userAnswers[qIdx]) userAnswers[qIdx] = { answer: [] };
            if (!userAnswers[qIdx].answer) userAnswers[qIdx].answer = [];
            userAnswers[qIdx].answer[fieldIdx] = value.trim();
            userAnswers[qIdx].type = selectedQuestions[qIdx].type;
        }
        
        function calculateMultipleChoicePoints(q, userAnswer) {
            if (!userAnswer || !userAnswer.length) return 0;
            const userSet = new Set(userAnswer);
            const correctSet = new Set(q.correct);
            for (let val of userSet) {
                if (!correctSet.has(val)) return 0;
            }
            const pointsPerCorrect = q.points / correctSet.size;
            let correctCount = 0;
            for (let val of userSet) {
                if (correctSet.has(val)) correctCount++;
            }
            return correctCount * pointsPerCorrect;
        }
        
        function checkMatching(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.correct.length) return false;
            for (let i = 0; i < q.correct.length; i++) {
                if (parseInt(userAnswer[i]) !== q.correct[i]) return false;
            }
            return true;
        }
        
        function checkFillMultiple(q, userAnswer) {
            if (!userAnswer || userAnswer.length !== q.fields.length) return false;
            for (let i = 0; i < q.fields.length; i++) {
                if (userAnswer[i]?.toLowerCase().trim() !== q.correct[i].toLowerCase()) return false;
            }
            return true;
        }
        
        function calculatePoints(q, userAnswer) {
            if (q.type === 'single') {
                return (userAnswer === q.correct) ? q.points : 0;
            } else if (q.type === 'multiple') {
                return calculateMultipleChoicePoints(q, userAnswer);
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer) ? q.points : 0;
            } else if (q.type === 'fill_multiple') {
                if (!userAnswer) return 0;
                
                let hasIncorrect = false;
                for (let i = 0; i < q.correct.length; i++) {
                    const userVal = userAnswer[i]?.trim();
                    if (userVal !== undefined && userVal !== '') {
                        if (userVal.toLowerCase() !== q.correct[i].toLowerCase()) {
                            hasIncorrect = true;
                            break;
                        }
                    }
                }
                
                if (hasIncorrect) return 0;
                
                let correctCount = 0;
                for (let i = 0; i < q.correct.length; i++) {
                    const userVal = userAnswer[i]?.trim();
                    if (userVal && userVal.toLowerCase() === q.correct[i].toLowerCase()) {
                        correctCount++;
                    }
                }
                
                const pointsPerField = q.points / q.correct.length;
                return correctCount * pointsPerField;
            }
            return 0;
        }
        
        function isFullyCorrect(q, userAnswer) {
            if (q.type === 'single') {
                return userAnswer === q.correct;
            } else if (q.type === 'multiple') {
                if (!userAnswer || !userAnswer.length) return false;
                const userSet = new Set(userAnswer);
                const correctSet = new Set(q.correct);
                if (userSet.size !== correctSet.size) return false;
                for (let val of userSet) {
                    if (!correctSet.has(val)) return false;
                }
                return true;
            } else if (q.type === 'matching') {
                return checkMatching(q, userAnswer);
            } else if (q.type === 'fill_multiple') {
                return checkFillMultiple(q, userAnswer);
            }
            return false;
        }
        
        function finishTest() {
            if (testFinished) return;
            if (timerInterval) clearInterval(timerInterval);
            testFinished = true;
            
            let totalPoints = 0, maxPoints = 0;
            
            selectedQuestions.forEach((q, idx) => {
                const userAnswer = userAnswers[idx]?.answer;
                const points = calculatePoints(q, userAnswer);
                const isFullyCorrectAnswer = isFullyCorrect(q, userAnswer);
                totalPoints += points;
                maxPoints += q.points;
                
                const feedbackDiv = document.getElementById(`feedback-${idx}`);
                const questionCard = document.getElementById(`q-${idx}`);
                
                if (isFullyCorrectAnswer) {
                    feedbackDiv.innerHTML = `✅ Тачно! Освојено ${points.toFixed(2)} поена.`;
                    feedbackDiv.className = 'feedback-indicator correct';
                    questionCard.classList.add('correct-highlight');
                } else {
                    let correctAnswerText = '';
                    if (q.type === 'single') {
                        correctAnswerText = `Тачан одговор: ${q.options[q.correct - 1]}`;
                    } else if (q.type === 'multiple') {
                        const correctTexts = q.correct.map(c => q.options[c - 1]);
                        correctAnswerText = `Тачни одговори: ${correctTexts.join(', ')}`;
                    } else if (q.type === 'matching') {
                        const correctTexts = [];
                        for (let i = 0; i < q.leftItems.length; i++) {
                            correctTexts.push(`${q.leftItems[i]} → ${q.correct[i]}`);
                        }
                        correctAnswerText = `Тачне везе: ${correctTexts.join('; ')}`;
                    } else if (q.type === 'fill_multiple') {
                        const correctTexts = q.fields.map((f, i) => `${f}: ${q.correct[i]}`);
                        correctAnswerText = `Тачни одговори: ${correctTexts.join(', ')}`;
                    }
                    feedbackDiv.innerHTML = `❌ Нетачно! ${correctAnswerText}<br>Освојено ${points.toFixed(2)} поена.`;
                    feedbackDiv.className = 'feedback-indicator incorrect';
                    questionCard.classList.add('incorrect-highlight');
                }
                
                // Vizuelna indikacija
                if (q.type === 'matching') {
                    for (let i = 0; i < q.correct.length; i++) {
                        const input = document.getElementById(`match-${idx}-${i}`);
                        if (input) {
                            const userVal = parseInt(userAnswer?.[i]);
                            if (userVal === q.correct[i]) input.classList.add('correct-answer');
                            else if (userVal) input.classList.add('incorrect-answer');
                        }
                    }
                } else if (q.type === 'fill_multiple') {
                    for (let i = 0; i < q.fields.length; i++) {
                        const input = document.getElementById(`fill-${idx}-${i}`);
                        if (input) {
                            const userVal = userAnswer?.[i];
                            if (userVal?.toLowerCase().trim() === q.correct[i].toLowerCase()) {
                                input.classList.add('correct-answer');
                            } else if (userVal && userVal.trim() !== '') {
                                input.classList.add('incorrect-answer');
                            }
                        }
                    }
                }
            });
            
            const resultSection = document.getElementById('resultSection');
            const resultScore = document.getElementById('resultScore');
            const resultFeedback = document.getElementById('resultFeedback');
            
            resultSection.style.display = 'block';
            resultScore.innerHTML = `${totalPoints.toFixed(2)} / ${maxPoints}`;
            
            const percentage = (totalPoints / maxPoints) * 100;
            if (percentage >= 90) resultFeedback.innerHTML = '🏆 Одличан резултат! Изванредно знање из веб програмирања! 🏆';
            else if (percentage >= 70) resultFeedback.innerHTML = '👍 Врло добро! Имате солидно знање из веб програмирања. 👍';
            else if (percentage >= 50) resultFeedback.innerHTML = '📚 Задовољавајући резултат. Имате простора за напредак. 📚';
            else resultFeedback.innerHTML = '📖 Потребно је више вежбе. Проучите градиво и покушајте поново. 📖';
            
            document.querySelectorAll('input').forEach(input => input.disabled = true);
            resultSection.scrollIntoView({ behavior: 'smooth' });
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (testFinished) return;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    const container = document.getElementById('testContent');
                    const timeExpiredDiv = document.createElement('div');
                    timeExpiredDiv.className = 'time-expired';
                    timeExpiredDiv.innerHTML = '⏰ Време је истекло! Тест се аутоматски завршава. ⏰';
                    container.insertBefore(timeExpiredDiv, container.firstChild);
                    finishTest();
                } else {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    document.getElementById('timerDisplay').innerHTML = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                    if (timeLeft <= 60) document.getElementById('timerDisplay').style.color = '#dc3545';
                }
            }, 1000);
        }
        
        function resetTest() {
            if (timerInterval) clearInterval(timerInterval);
            timeLeft = 15 * 60;
            testFinished = false;
            document.getElementById('timerDisplay').innerHTML = '15:00';
            document.getElementById('timerDisplay').style.color = '#ffd700';
            document.getElementById('resultSection').style.display = 'none';
            renderQuestions();
            startTimer();
        }
        
        renderQuestions();
        startTimer();
    </script>
</body>
</html>
